name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install WebAssembly AOT workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore ArmageddonRidge.slnx

      - name: Generate sprites
        run: dotnet run --project tools/ArmageddonRidge.AssetPipeline/ArmageddonRidge.AssetPipeline.csproj

      - name: Publish static app
        run: dotnet publish ArmageddonRidge.Client/ArmageddonRidge.Client.csproj -c Release --no-restore

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          publish_dir="ArmageddonRidge.Client/bin/Release/net10.0/publish/wwwroot"
          touch "$publish_dir/.nojekyll"
          cp "$publish_dir/index.html" "$publish_dir/404.html"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ArmageddonRidge.Client/bin/Release/net10.0/publish/wwwroot

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
