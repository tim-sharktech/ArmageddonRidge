<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armageddon Ridge</title>
    <base href="./" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot-screen">
            <div class="boot-title">
                <span>Armageddon</span>
                <span>Ridge</span>
            </div>
            <div class="boot-subtitle">Loading artillery systems</div>
            <div class="boot-meter" aria-hidden="true"><span></span></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        const armageddonRidgeIsLocalHost = ['localhost', '127.0.0.1', '::1', '[::1]'].includes(location.hostname);

        async function prepareArmageddonRidgeBootAsync() {
            if (!armageddonRidgeIsLocalHost || !('serviceWorker' in navigator)) return;

            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(registration => registration.unregister()));

            if ('caches' in window) {
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(cacheName => caches.delete(cacheName)));
            }
        }
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
    <script>
        (async () => {
            await prepareArmageddonRidgeBootAsync();
            await Blazor.start({
                loadBootResource: (type, name, defaultUri) => {
                    if (armageddonRidgeIsLocalHost && type === 'dotnetjs') return '_framework/dotnet.js';
                    return defaultUri;
                }
            });

            if (!armageddonRidgeIsLocalHost && 'serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
            }
        })();
    </script>
</body>

</html>
